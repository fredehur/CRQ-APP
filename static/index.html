<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRQ Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            critical: '#dc2626',
            high: '#ea580c',
            medium: '#d97706',
            low: '#16a34a',
            clear: '#22c55e',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    .log-panel { font-family: 'Courier New', monospace; font-size: 0.75rem; }
    .severity-badge { @apply px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wide; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold tracking-tight">CRQ Command Center</h1>
      <p class="text-sm text-gray-500">AeroGrid Wind Solutions — Geopolitical Risk Intelligence</p>
    </div>
    <div class="flex items-center gap-3">
      <span id="pipeline-status" class="text-sm text-gray-500">Idle</span>
      <select id="mode-select" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm">
        <option value="tools">Tools Mode</option>
        <option value="full">Full (LLM)</option>
      </select>
      <button onclick="runAll()" id="btn-run-all"
        class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded text-sm font-medium transition-colors">
        Run All Regions
      </button>
    </div>
  </header>

  <!-- KPI Strip -->
  <section id="kpi-strip" class="grid grid-cols-4 gap-4 px-6 py-5 border-b border-gray-800">
    <div class="bg-gray-900 rounded-lg p-4">
      <p class="text-xs text-gray-500 uppercase tracking-wide">Total VaCR Exposure</p>
      <p id="kpi-vacr" class="text-2xl font-bold mt-1">—</p>
    </div>
    <div class="bg-gray-900 rounded-lg p-4">
      <p class="text-xs text-gray-500 uppercase tracking-wide">Regions Analyzed</p>
      <p id="kpi-analyzed" class="text-2xl font-bold mt-1">—</p>
    </div>
    <div class="bg-gray-900 rounded-lg p-4">
      <p class="text-xs text-gray-500 uppercase tracking-wide">Escalated</p>
      <p id="kpi-escalated" class="text-2xl font-bold mt-1 text-orange-400">—</p>
    </div>
    <div class="bg-gray-900 rounded-lg p-4">
      <p class="text-xs text-gray-500 uppercase tracking-wide">Last Run</p>
      <p id="kpi-timestamp" class="text-2xl font-bold mt-1">—</p>
    </div>
  </section>

  <!-- Live Pipeline Strip (hidden when idle) -->
  <div id="live-strip" class="hidden bg-gray-900 border-b border-gray-700 px-6 py-3">
    <div class="flex items-center gap-2 mb-2">
      <span class="inline-block w-2 h-2 rounded-full bg-blue-400 animate-pulse"></span>
      <span class="text-xs font-semibold uppercase tracking-wide text-blue-400">Pipeline Running</span>
    </div>
    <div id="live-region-states" class="flex flex-wrap gap-2">
      <!-- JS-populated region state chips -->
    </div>
  </div>

  <!-- Main Content -->
  <main class="grid grid-cols-3 gap-0 h-[calc(100vh-200px)]">

    <!-- Region Cards (2/3 width) -->
    <section class="col-span-2 p-6 overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-400">Regional Threat Status</h2>
      </div>
      <div id="region-cards" class="grid grid-cols-2 gap-4 xl:grid-cols-3">
        <!-- JS-rendered -->
      </div>

      <!-- Executive Summary -->
      <div id="exec-summary-section" class="mt-6 hidden">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-400 mb-3">Executive Summary</h2>
        <div id="exec-summary" class="bg-gray-900 rounded-lg p-5 text-sm text-gray-300 leading-relaxed"></div>
      </div>
    </section>

    <!-- Log Panel (1/3 width) -->
    <aside class="border-l border-gray-800 flex flex-col">
      <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-400">Live Event Log</h2>
        <button onclick="clearLog()" class="text-xs text-gray-600 hover:text-gray-400">Clear</button>
      </div>
      <div id="log-panel" class="log-panel flex-1 overflow-y-auto p-4 space-y-1"></div>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
